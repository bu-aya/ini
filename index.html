<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Administrasi - SDIT ANNIHAYAH</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Backend Logic) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .print-only { display: none; }
        @media print {
            .no-print { display: none; }
            .print-only { display: block; }
            body { background-color: white; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 1. BACKEND LOGIC: FIREBASE INITIALIZATION
        // ==========================================
        // Anda WAJIB mengganti nilai di bawah ini dengan konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "KODE_API_ANDA",
            authDomain: "project-anda.firebaseapp.com",
            projectId: "project-anda",
            storageBucket: "project-anda.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // ==========================================
        // 2. KOMPONEN UTAMA (FRONTEND)
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [suratMasuk, setSuratMasuk] = useState([]);
            
            // Logika Mengambil Data dari Backend (Firestore)
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const snapshot = await db.collection('surat_masuk').get();
                        const dataSurat = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setSuratMasuk(dataSurat);
                    } catch (error) {
                        console.log("Koneksi database belum diatur:", error.message);
                    }
                };
                fetchData();
            }, []);

            // Logika Menyimpan Data ke Backend
            const tambahSurat = async (e) => {
                e.preventDefault();
                const nomorSurat = e.target.nomorSurat.value;
                const pengirim = e.target.pengirim.value;

                try {
                    await db.collection('surat_masuk').add({
                        nomorSurat,
                        pengirim,
                        tanggal: new Date().toISOString()
                    });
                    alert("Surat berhasil direkap!");
                    window.location.reload(); // Refresh sederhana
                } catch (error) {
                    alert("Gagal menyimpan. Pastikan konfigurasi Firebase benar.");
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-gray-100 no-print">
                    {/* Sidebar */}
                    <aside className="w-64 bg-blue-900 text-white flex flex-col">
                        <div className="p-6 text-center font-bold text-xl border-b border-blue-800">
                            SDIT ANNIHAYAH
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full text-left p-3 rounded ${activeTab === 'dashboard' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}>Dashboard</button>
                            <button onClick={() => setActiveTab('surat')} className={`w-full text-left p-3 rounded ${activeTab === 'surat' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}>Arsip Surat</button>
                            <button onClick={() => setActiveTab('ijazah')} className={`w-full text-left p-3 rounded ${activeTab === 'ijazah' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}>Cetak Ijazah</button>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-full overflow-y-auto">
                        <header className="bg-white shadow p-4 font-semibold text-gray-700">
                            Sistem Administrasi Sekolah & Kearsipan
                        </header>
                        
                        <div className="p-6">
                            {/* Tampilan Dashboard */}
                            {activeTab === 'dashboard' && (
                                <div>
                                    <h2 className="text-2xl font-bold mb-4">Ringkasan Sistem</h2>
                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="bg-white p-6 rounded shadow border-t-4 border-blue-500">
                                            <p className="text-gray-500 text-sm">Total Surat Masuk</p>
                                            <p className="text-3xl font-bold">{suratMasuk.length}</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Tampilan Arsip Surat */}
                            {activeTab === 'surat' && (
                                <div className="bg-white p-6 rounded shadow">
                                    <h2 className="text-xl font-bold mb-4">Rekap Surat Masuk</h2>
                                    <form onSubmit={tambahSurat} className="mb-6 flex gap-4">
                                        <input type="text" name="nomorSurat" placeholder="Nomor Surat" className="border p-2 rounded w-full" required />
                                        <input type="text" name="pengirim" placeholder="Pengirim / Asal" className="border p-2 rounded w-full" required />
                                        <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded">Simpan</button>
                                    </form>

                                    <table className="w-full border-collapse border border-gray-200">
                                        <thead>
                                            <tr className="bg-gray-100">
                                                <th className="border p-2">No. Surat</th>
                                                <th className="border p-2">Pengirim</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {suratMasuk.map(surat => (
                                                <tr key={surat.id}>
                                                    <td className="border p-2">{surat.nomorSurat}</td>
                                                    <td className="border p-2">{surat.pengirim}</td>
                                                </tr>
                                            ))}
                                            {suratMasuk.length === 0 && <tr><td colSpan="2" className="text-center p-4">Belum ada data</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                             {/* Tampilan Ijazah */}
                             {activeTab === 'ijazah' && (
                                <div className="bg-white p-6 rounded shadow">
                                    <h2 className="text-xl font-bold mb-4">Fitur Ijazah (Preview)</h2>
                                    <p className="text-gray-600 mb-4">Fitur ini akan menarik data siswa berstatus Lulus dari database Firestore.</p>
                                    <button onClick={() => window.print()} className="bg-green-600 text-white px-4 py-2 rounded">Cetak Ijazah (Test Print)</button>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
